<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archiwum - Życzenia Prezentowe</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#F44336">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="seba_logo.png">
    <link rel="apple-touch-icon" href="seba_logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.deduped.min.css" rel="stylesheet">
    <style>
        html, body { overflow-x: hidden; max-width: 100vw; }
        body {
            background-image: url('seba.jpg') !important;
            background-attachment: fixed !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
            background-size: cover !important;
        }
        .background-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 16px;
            color: white;
        }
        .glass-card * { color: white; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5); }
        .year-pill {
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px;
            padding: 6px 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .year-pill.active, .year-pill:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: white;
        }
        .archive-recipient-header {
            font-weight: 700;
            font-size: 17px;
            margin: 20px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .archive-present {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
        }
        .archive-present .status { font-size: 13px; opacity: 0.85; }
        /* Modal is on white background - normal colors */
        .modal-content, .modal-content * { color: #212529; text-shadow: none; }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <div class="container mt-4 mb-5" style="max-width: 820px;">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <a href="/" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Powrót
            </a>
            <button class="btn btn-warning btn-sm fw-semibold" data-bs-toggle="modal" data-bs-target="#archiveModal">
                <i class="fas fa-box-archive me-1"></i>Zamknij rok i archiwizuj
            </button>
        </div>

        <div class="glass-card p-4">
            <h4 class="mb-1"><i class="fas fa-box-archive me-2"></i>Archiwum prezentów</h4>
            <p class="mb-3" style="opacity: 0.85;">Prezenty z poprzednich lat. Tutaj nic nie zginie.</p>

            <div id="yearPills" class="d-flex gap-2 flex-wrap mb-3"></div>

            <div id="archiveContent">
                <div class="text-center py-5">
                    <div class="spinner-border text-light" role="status">
                        <span class="visually-hidden">Ładowanie...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Archive confirmation modal -->
    <div class="modal fade" id="archiveModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-box-archive me-2"></i>Zamknij rok</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-warning">
                        <strong>Uwaga!</strong> Wszystkie obecne prezenty zostaną przeniesione do archiwum,
                        a lista prezentów i aktywność zaczną się od zera. Osoby i konta zostają bez zmian.
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Rok, pod którym zapisać archiwum</label>
                        <select id="archiveYearSelect" class="form-select"></select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-semibold">Wpisz <code>ARCHIWIZUJ</code> aby potwierdzić</label>
                        <input type="text" id="archiveConfirmInput" class="form-control" placeholder="ARCHIWIZUJ" autocomplete="off">
                    </div>
                    <div id="archiveModalMessage" class="alert mt-3" style="display: none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                    <button type="button" class="btn btn-warning fw-semibold" id="archiveRunBtn" onclick="runArchive()">
                        <i class="fas fa-box-archive me-1"></i>Archiwizuj
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedYear = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadYears();
            populateYearSelect();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        // Sensible default label: after Christmas you archive LAST year's presents,
        // in Nov/Dec you might close the current year
        function defaultArchiveYear() {
            const now = new Date();
            return now.getMonth() >= 10 ? now.getFullYear() : now.getFullYear() - 1;
        }

        function populateYearSelect() {
            const select = document.getElementById('archiveYearSelect');
            const def = defaultArchiveYear();
            const current = new Date().getFullYear();
            for (let y = current; y >= current - 5; y--) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                if (y === def) opt.selected = true;
                select.appendChild(opt);
            }
        }

        function loadYears() {
            fetch('/api/archive/years')
                .then(r => {
                    if (r.status === 401) { window.location.href = '/'; throw new Error('auth'); }
                    return r.json();
                })
                .then(data => {
                    const pills = document.getElementById('yearPills');
                    if (!data.years || data.years.length === 0) {
                        pills.innerHTML = '';
                        document.getElementById('archiveContent').innerHTML = `
                            <div class="text-center py-5">
                                <div style="font-size: 48px;">🗃️</div>
                                <h5 class="mt-2">Archiwum jest puste</h5>
                                <p style="opacity: 0.85;">Gdy zamkniesz rok, wszystkie prezenty trafią tutaj.</p>
                            </div>`;
                        return;
                    }
                    pills.innerHTML = data.years.map(y =>
                        `<button class="year-pill" data-year="${y.year}" onclick="selectYear(${y.year})">${y.year} <span style="opacity:0.7;">(${y.count})</span></button>`
                    ).join('');
                    selectYear(data.years[0].year);
                })
                .catch(err => {
                    if (err.message === 'auth') return;
                    showLoadError();
                });
        }

        function selectYear(year) {
            selectedYear = year;
            document.querySelectorAll('.year-pill').forEach(p =>
                p.classList.toggle('active', parseInt(p.dataset.year) === year));

            const content = document.getElementById('archiveContent');
            content.innerHTML = `<div class="text-center py-4"><div class="spinner-border text-light"></div></div>`;

            fetch(`/api/archive/presents?year=${year}`)
                .then(r => r.json())
                .then(data => renderPresents(data.presents || []))
                .catch(() => showLoadError());
        }

        function renderPresents(presents) {
            const content = document.getElementById('archiveContent');
            if (presents.length === 0) {
                content.innerHTML = '<p class="text-center py-4" style="opacity:0.85;">Brak prezentów w tym roku</p>';
                return;
            }

            // Group by recipient
            const groups = {};
            presents.forEach(p => {
                const key = p.recipient_name || 'Bez osoby';
                (groups[key] = groups[key] || []).push(p);
            });

            content.innerHTML = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'pl')).map(name => `
                <div class="archive-recipient-header"><i class="fas fa-user"></i>${escapeHtml(name)}
                    <span style="font-weight:400; opacity:0.7; font-size:14px;">(${groups[name].length})</span>
                </div>
                ${groups[name].map(p => `
                    <div class="archive-present">
                        <div class="fw-semibold">
                            ${p.is_checked ? '<i class="fas fa-check-circle me-1" style="color:#7CFC90;"></i>' : ''}${escapeHtml(p.title)}
                        </div>
                        ${p.comments ? `<div style="font-size:13px; opacity:0.8;">${escapeHtml(p.comments)}</div>` : ''}
                        <div class="status">
                            ${p.is_checked
                                ? `🛍️ Kupione${p.reserved_by_username ? ' przez: ' + escapeHtml(p.reserved_by_username) : ''}`
                                : (p.reserved_by_username
                                    ? `🔖 Zarezerwowane przez: ${escapeHtml(p.reserved_by_username)} (niekupione)`
                                    : '⚪ Nikt nie zarezerwował')}
                        </div>
                    </div>
                `).join('')}
            `).join('');
        }

        function showLoadError() {
            document.getElementById('archiveContent').innerHTML = `
                <div class="text-center py-4">
                    <p>Nie udało się załadować archiwum.</p>
                    <button class="btn btn-outline-light btn-sm" onclick="loadYears()">
                        <i class="fas fa-rotate-right me-1"></i>Spróbuj ponownie
                    </button>
                </div>`;
        }

        function runArchive() {
            const year = parseInt(document.getElementById('archiveYearSelect').value);
            const confirmText = document.getElementById('archiveConfirmInput').value.trim();
            const msg = document.getElementById('archiveModalMessage');
            const btn = document.getElementById('archiveRunBtn');

            msg.style.display = 'none';

            if (confirmText !== 'ARCHIWIZUJ') {
                msg.className = 'alert alert-danger mt-3';
                msg.textContent = 'Wpisz ARCHIWIZUJ (dokładnie tak), aby potwierdzić.';
                msg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Archiwizuję...';

            fetch('/api/archive/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ year, confirmText })
            })
                .then(r => r.json().then(data => ({ ok: r.ok, data })))
                .then(({ ok, data }) => {
                    if (ok && data.success) {
                        msg.className = 'alert alert-success mt-3';
                        msg.textContent = `Gotowe! Zarchiwizowano ${data.archivedPresents} prezentów pod rokiem ${data.year}. Lista prezentów jest teraz pusta.`;
                        msg.style.display = 'block';
                        // Clear cached data so all pages show the clean slate
                        try {
                            localStorage.removeItem('recipientsCache');
                        } catch (e) { /* ignore */ }
                        document.getElementById('archiveConfirmInput').value = '';
                        setTimeout(() => {
                            const modalEl = document.getElementById('archiveModal');
                            const instance = bootstrap.Modal.getInstance(modalEl);
                            if (instance) instance.hide();
                            loadYears();
                        }, 2500);
                    } else {
                        msg.className = 'alert alert-danger mt-3';
                        msg.textContent = data.error || 'Nie udało się zarchiwizować. Spróbuj ponownie.';
                        msg.style.display = 'block';
                    }
                })
                .catch(() => {
                    msg.className = 'alert alert-danger mt-3';
                    msg.textContent = 'Błąd połączenia. Sprawdź internet i spróbuj ponownie.';
                    msg.style.display = 'block';
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-box-archive me-1"></i>Archiwizuj';
                });
        }
    </script>
</body>
</html>
